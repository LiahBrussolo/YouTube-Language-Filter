<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YouTube Language Filter</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <div class="popup-header">
    <h1>YouTube Language Filter</h1>
    <button id="theme-btn" title="Toggle light / dark"></button>
  </div>

  <label class="power-row">
    <span>Extension Enabled</span>
    <span class="switch">
      <input type="checkbox" id="ext-enabled" checked>
      <span class="slider"></span>
    </span>
  </label>

  <div class="toggles">
    <label class="toggle-row">
      <span>Hide Homepage Feed</span>
      <span class="switch">
        <input type="checkbox" id="hide-home">
        <span class="slider"></span>
      </span>
    </label>
    <label class="toggle-row">
      <span>Hide Watch Page Sidebar</span>
      <span class="switch">
        <input type="checkbox" id="hide-sidebar">
        <span class="slider"></span>
      </span>
    </label>
    <label class="toggle-row sub" id="hide-playlist-row">
      <span>Hide playlist</span>
      <span class="switch">
        <input type="checkbox" id="hide-playlist">
        <span class="slider"></span>
      </span>
    </label>
    <label class="toggle-row">
      <span>Hide Shorts</span>
      <span class="switch">
        <input type="checkbox" id="hide-shorts">
        <span class="slider"></span>
      </span>
    </label>
    <label class="toggle-row">
      <span>Hide Distractions</span>
      <span class="switch">
        <input type="checkbox" id="hide-engagements">
        <span class="slider"></span>
      </span>
    </label>
    <label class="toggle-row">
      <span>Hide Comments</span>
      <span class="switch">
        <input type="checkbox" id="hide-comments">
        <span class="slider"></span>
      </span>
    </label>
  </div>

  <div class="api-section">
    <button id="toggle-btn">YouTube Data API v3 Key</button>
    <p id="key-status"></p>
    <div id="key-section" hidden>
      <input id="key" type="text" placeholder="AIzaSy…" autocomplete="off" spellcheck="false">
      <div id="actions">
        <button id="save">Save</button>
        <button id="clear">Clear</button>
      </div>
      <p class="hint">
        Get a free key: <b>console.cloud.google.com</b><br>
        → Enable <b>YouTube Data API v3</b> → Credentials
      </p>
    </div>
  </div>

  <p id="status"></p>

  <a class="learn-more" href="https://liahbrussolo.wordpress.com/youtube-language-filter/" target="_blank" rel="noopener noreferrer">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"></circle>
      <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
      <line x1="12" y1="17" x2="12.01" y2="17"></line>
    </svg>
    <span>Learn more</span>
  </a>

  <script src="popup.js"></script>
</body>
</html>
