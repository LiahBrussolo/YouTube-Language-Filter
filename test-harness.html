<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>YTLF flicker harness</title>
<link rel="stylesheet" href="/styles.css">
<style>
  body { background: #0f0f0f; color: #eee; font-family: Arial, sans-serif; }
  #masthead { display: flex; height: 56px; align-items: center; }
  #center { display: flex; flex: 1; }
  ytd-video-renderer {
    display: block; height: 36px; margin: 6px; padding: 8px;
    background: #272727; border-radius: 6px; overflow: hidden;
  }
  ytd-video-renderer a { color: #9cf; text-decoration: none; }
  #report { white-space: pre; font: 12px monospace; color: #8f8; padding: 12px; }
</style>
</head>
<body>
  <div id="masthead"><div id="center"></div></div>
  <ytd-page-manager>
    <ytd-search>
      <ytd-section-list-renderer id="list"></ytd-section-list-renderer>
    </ytd-search>
  </ytd-page-manager>
  <div id="report">running…</div>

<script>
// Test toggle: ?...&nofix disables the churn fix to prove the harness catches it.
if (location.search.includes('nofix')) window.__YTLF_DISABLE_FIX = true;
if (location.search.includes('prehide')) window.__YTLF_PREHIDE = true;

// ─── error trap: catch anything content.js throws ─────────────────────────
window.__errors = [];
window.addEventListener('error', e =>
  window.__errors.push(`${e.message} @ ${(e.filename || '').split('/').pop()}:${e.lineno}`));
window.addEventListener('unhandledrejection', e =>
  window.__errors.push(`rejection: ${e.reason?.message ?? e.reason}`));

// ─── chrome API shim (no API key → text-detection path) ───────────────────
window.chrome = {
  runtime: { id: 'harness', getManifest: () => ({ version: 'harness' }) },
  storage: {
    // async like the real chrome.storage — a sync callback would run mid-script
    sync: { get: (keys, cb) => setTimeout(() => cb({}), 0) },
    onChanged: { addListener() {} },
  },
  i18n: {
    detectLanguage: (text, cb) => setTimeout(() => {
      const it = /\b(pane|come|fare|ricetta|casa|fatto|della|cucina|impasto|veloce|pizza|lievito)\b/i
        .test(text);
      cb({ languages: [{ language: it ? 'it' : 'en', percentage: 90 }] });
    }, 5 + Math.random() * 20),
  },
};
localStorage.setItem('ytlf_lang', 'it');
localStorage.removeItem('ytlf_theme');

// ─── flicker recorder: samples user-visible state every 16ms ──────────────
const samples = [];
setInterval(() => {
  const search = document.querySelector('ytd-page-manager');
  const veil = getComputedStyle(search).visibility; // 'hidden' under the veil
  const rs = [...document.querySelectorAll('ytd-video-renderer')];
  const shown = rs.filter(r => r.style.display !== 'none').length;
  const prev = samples[samples.length - 1];
  if (!prev || prev.veil !== veil || prev.shown !== shown || prev.total !== rs.length) {
    samples.push({ t: Math.round(performance.now()), veil, shown, total: rs.length });
  }
}, 16);

// ─── WRONG-RESULT recorder: the core guarantee ─────────────────────────────
// The user must NEVER see a pre-filter (wrong-language) card. Every 16ms, check
// each card: if it's English (should be hidden for lang=it) AND it is EFFECTIVELY
// visible to the user — computed visibility !== hidden (accounts for both the
// global veil, inherited from ytd-page-manager, and a per-card visibility:hidden)
// AND display !== none — that's a violation. Italian cards being visible is the
// correct final state and is ignored.
const IT_RE = /\b(pane|come|fare|ricetta|casa|fatto|della|cucina|impasto|veloce|pizza|lievito)\b/i;
let wrongVisible = 0;
const wrongVisibleLog = [];
setInterval(() => {
  document.querySelectorAll('ytd-video-renderer').forEach(r => {
    const title = r.querySelector('a#video-title')?.textContent ?? '';
    if (!title || IT_RE.test(title)) return;                  // empty or Italian → fine
    const effVisible = getComputedStyle(r).visibility !== 'hidden' && r.style.display !== 'none';
    if (effVisible) {
      wrongVisible++;
      if (wrongVisibleLog.length < 10)
        wrongVisibleLog.push(`${Math.round(performance.now())}ms ENGLISH card visible: "${title.slice(0, 40)}"`);
    }
  });
}, 16);

// ─── per-node OSCILLATION recorder ─────────────────────────────────────────
// True churn = a card that flips visibility MORE THAN ONCE (shown→hidden→shown…).
// A single shown→hidden (legitimately hiding a confirmed non-matching card) is
// fine and expected. We count nodes whose visibility changed >1 time.
const flipState = new WeakMap(); // node -> { last, changes }
let reHideFlips = 0;             // = total transitions beyond the first, summed
const flipLog = [];
function noteDisplay(node) {
  const d = node.style.display === 'none' ? 'none' : 'shown';
  const s = flipState.get(node) || { last: null, changes: 0 };
  if (s.last !== null && s.last !== d) {
    s.changes++;
    if (s.changes > 1) { // 2nd+ change = oscillation = churn
      reHideFlips++;
      flipLog.push(`${Math.round(performance.now())}ms card oscillated (${s.changes} flips)`);
    }
  }
  s.last = d;
  flipState.set(node, s);
}
const styleObs = new MutationObserver(muts => {
  for (const m of muts) if (m.type === 'attributes') noteDisplay(m.target);
});
function watchRenderers() {
  document.querySelectorAll('ytd-video-renderer').forEach(r => {
    if (!flipState.has(r)) { flipState.set(r, { last: null, changes: 0 }); noteDisplay(r); }
    styleObs.observe(r, { attributes: true, attributeFilter: ['style'] });
  });
}
setInterval(watchRenderers, 50);

// ─── YouTube results-page simulation ───────────────────────────────────────
const IT = ['come fare il pane in casa', 'ricetta della pizza napoletana',
  'pane fatto in casa veloce', 'impasto per pizza perfetto', 'cucina italiana ricetta',
  'come fare la pasta della nonna', 'pane senza impasto ricetta', 'fare il pane con lievito madre'];
const EN = ['how to bake sourdough bread', 'easy bread recipe at home',
  'baking tips for beginners', 'best bread machine review', 'crusty loaf tutorial'];
let seq = 0;
function title(i) { return (i % 3 === 2) ? EN[i % EN.length] : IT[i % IT.length]; }
function renderer(id, bound) {
  const r = document.createElement('ytd-video-renderer');
  if (bound) bind(r, id);
  return r;
}
function bind(r, id) {
  r.innerHTML = `<a id="video-title" href="/watch?v=${id}">${title(parseInt(id.slice(1), 10))}</a>`;
}
const list = document.getElementById('list');
const fire = (name) => document.dispatchEvent(new CustomEvent(name));

const ids = (n) => Array.from({ length: n }, () => `v${String(seq++).padStart(3, '0')}`);

const waveA = ids(12);   // initial results: added EMPTY, bound later (Polymer-style)
let waveB = [];          // replacement wave: half reused, half new

setTimeout(() => fire('yt-navigate-start'), 0);
setTimeout(() => fire('yt-navigate-finish'), 100);
setTimeout(() => { waveA.forEach(id => list.appendChild(renderer(id, false))); }, 250);
setTimeout(() => { [...list.children].forEach((r, i) => bind(r, waveA[i])); }, 450);
setTimeout(() => fire('yt-navigate-finish'), 600); // duplicate finish, same URL
setTimeout(() => { // full list replacement: same videos + new ones (YouTube hydration)
  waveB = [...waveA, ...ids(12)];
  list.innerHTML = '';
  waveB.forEach(id => list.appendChild(renderer(id, true)));
}, 1400);
setTimeout(() => { ids(12).forEach(id => list.appendChild(renderer(id, true))); }, 2800);

// ─── THE CHURN REPRODUCER ──────────────────────────────────────────────────
// Real YouTube re-stamps already-decided, already-visible cards (Polymer
// dom-repeat, filter-chip apply, lazy badge/metadata binding). During a
// re-stamp the <a#video-title> href is momentarily empty WHILE other child
// nodes are (re)added to the card — the added node triggers the observer ->
// queueRenderer(host), and getVideoId() returns null because the href is blank.
// Old code hid the visible card here, then showed it again on rebind = churn.
// Run several waves, each holding the blank-href state ~150ms so the 16ms
// sampler catches any visible->hidden flip.
function restampWave() {
  document.querySelectorAll('ytd-video-renderer').forEach(r => {
    if (r.style.display === 'none') return;       // only re-stamp visible cards
    const a = r.querySelector('a#video-title');
    if (!a) return;
    const href = a.href;
    a.removeAttribute('href');                     // getVideoId() now returns null
    const probe = document.createElement('div');   // unrelated child -> observer fires
    probe.className = 'ytlf-restamp-probe';
    r.appendChild(probe);
    setTimeout(() => {
      a.href = href;                               // rebind
      r.appendChild(document.createElement('span')); // another mutation on rebind
    }, 150);
  });
}
setTimeout(restampWave, 3600);
setTimeout(restampWave, 4200);
setTimeout(restampWave, 4800);

// ─── THE RECYCLE REPRODUCER ────────────────────────────────────────────────
// YouTube reuses ytd-video-renderer DOM nodes for DIFFERENT videos as the list
// updates. A node showing video A (Italian, visible) gets its anchor rebound to
// video B. Old code pre-hid the visible node before re-deciding B = blank flash.
// The fix keeps a previously-shown node visible until B's decision lands.
let recycleSeq = 5000;
function recycleWave() {
  document.querySelectorAll('ytd-video-renderer').forEach(r => {
    if (r.style.display === 'none') return;        // only recycle visible cards
    const a = r.querySelector('a#video-title');
    if (!a) return;
    const newId = 'rc' + (recycleSeq++);
    a.href = '/watch?v=' + newId;                  // same node, NEW video id (Italian)
    a.textContent = 'ricetta pane fatto in casa ' + newId;
  });
}
setTimeout(recycleWave, 5200);
setTimeout(recycleWave, 5600);

// ─── verdict ────────────────────────────────────────────────────────────────
setTimeout(() => {
  const violations = [];
  let maxShownSoFar = 0, blankWithCards = 0;
  for (let i = 1; i < samples.length; i++) {
    const b = samples[i];
    // BLANK-PAGE state: cards exist on the page but NONE are visible. This is the
    // empty results area that makes YouTube's infinite scroll fire continuously
    // (the "results keep refreshing" the user saw). Healthy = cards stay visible.
    if (b.total > 0 && b.shown === 0) {
      blankWithCards++;
      if (violations.length < 8) violations.push(`t=${b.t}ms page BLANK with ${b.total} cards loaded (shown=0) — infinite-scroll trigger`);
    }
    maxShownSoFar = Math.max(maxShownSoFar, b.shown);
  }
  const final = samples[samples.length - 1];
  const veilStuck = getComputedStyle(document.querySelector('ytd-page-manager')).visibility === 'hidden';
  window.__report = {
    // The core guarantees: never an oscillation, never an infinite-scroll-blank,
    // never a wrong-language card visible to the user, and the veil always lifts.
    pass: reHideFlips === 0 && blankWithCards === 0 && wrongVisible === 0 && !veilStuck,
    oscillations: reHideFlips,
    blankWithCards,
    wrongVisible,            // sample-ticks where an English card was visible — must be 0
    wrongVisibleLog,
    veilStuck,               // veil failed to lift — must be false
    violations,
    flipLog: flipLog.slice(0, 10),
    finalShown: final.shown,
    finalTotal: final.total,
    peakShown: maxShownSoFar,
    timeline: samples,
  };
  document.getElementById('report').textContent =
    JSON.stringify({ ...window.__report, timeline: undefined }, null, 2) +
    '\n\ntimeline:\n' + samples.map(s => `${s.t}ms veil=${s.veil} shown=${s.shown}/${s.total}`).join('\n');
}, 7000);
</script>

<!-- the real extension files -->
<script src="/content.js"></script>
</body>
</html>
